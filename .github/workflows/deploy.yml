# WHY THIS WAS CHOSEN:
# This GitHub Actions workflow implements the Continuous Integration (CI) pipeline. 
# It triggers on pushes or pull requests to `main`. It spins up local services (pgvector 
# and Redis) to run all backend integration tests, verifies the frontend build, 
# and validates both Docker files. It prevents broken code from merging to main, 
# while letting Render and Vercel handle deployments natively.

name: Continuous Integration

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  backend-test:
    name: Backend Tests & Lint
    runs-on: ubuntu-latest

    services:
      postgres:
        image: pgvector/pgvector:pg16
        ports:
          - 5432:5432
        env:
          POSTGRES_DB: portfolio
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install ruff pytest anyio pytest-anyio

      - name: Run Linter (Ruff)
        run: |
          ruff check backend/src backend/tests

      - name: Run Backend Tests
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/portfolio
          REDIS_URL: redis://localhost:6379
          ENVIRONMENT: development
          AZURE_OPENAI_ENDPOINT: https://mock-endpoint.cognitiveservices.azure.com/
          AZURE_OPENAI_KEY: mock-key
          GEMINI_API_KEY: mock-gemini-key
        run: |
          # Root pyproject.toml sets pythonpath = ["backend"], so `from src.xxx`
          # resolves correctly when running from the repo root.
          python -m pytest backend/tests

  frontend-build:
    name: Frontend Build Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Dependencies
        run: |
          cd frontend
          npm ci

      - name: Build Next.js Application
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000
        run: |
          cd frontend
          npm run build

  docker-validation:
    name: Docker Build Validation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Backend Docker Image (Dry Run)
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: false
          tags: portfolio-backend:test

      - name: Build Frontend Docker Image (Dry Run)
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: false
          tags: portfolio-frontend:test

project: talentforge
type: fullstack
github_repo: AjaySusanth/smart-talent-selection

auto_ingest:
  # Documentation — always include
  - "README.md"
  - "APPROACH.md"

  # Core AI & Business Logic — the "how" that Layer 2 doesn't fully show
  - "backend/app/services/ranking/*.py"
  - "backend/app/services/jd/*.py"
  - "backend/app/services/parsing/*.py"

  # API Layer
  - "backend/app/api/v1/routes/*.py"

  # Async Pipeline — unique architectural proof point
  - "backend/app/workers/celery_app.py"
  - "backend/app/workers/tasks/*.py"

  # Data contracts — schemas only (models are redundant)
  - "backend/app/schemas/*.py"

  # Infra config — one file that proves deployment knowledge
  - "docker-compose.yml"

ignore:
  - "**/__pycache__/**"
  - "**/.venv/**"
  - "**/node_modules/**"
  - "**/dist/**"
  - "**/.git/**"
  - "docs/**"
  - "backend/app/db/migrations/**"
  - "docs/sample_resumes/**"
  - "**/*.pdf"
  # Newly excluded — low signal, redundant, or Layer 2 territory
  - "backend/app/models/**"
  - "backend/app/core/**"
  - "frontend/**"